<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>KlassenChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── SCREEN 1: Profil anlegen ── -->
  <div id="screen-profile" class="screen active">
    <div class="profile-card">
      <div class="logo-mark">💬</div>
      <h1>KlassenChat</h1>
      <p class="subtitle">Erstelle dein Profil und leg los!</p>

      <div id="avatar-editor-container"></div>

      <div class="input-group">
        <input type="text" id="username-input" maxlength="20" placeholder="Dein Username…" autocomplete="off" />
      </div>

      <button class="btn-primary" id="join-btn">Beitreten →</button>
    </div>
  </div>

  <!-- ── SCREEN 2: Warteraum ── -->
  <div id="screen-waiting" class="screen">
    <div class="waiting-card">
      <div class="user-badge" id="waiting-badge"></div>
      <h2 id="waiting-name"></h2>
      <div class="waiting-animation">
        <span></span><span></span><span></span>
      </div>
      <p class="waiting-text">Warte auf die Lehrkraft…</p>
      <div class="online-list">
        <p class="online-label">Online in diesem Raum:</p>
        <div id="online-users"></div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 3: Chat ── -->
  <div id="screen-chat" class="screen">
    <div class="chat-header">
      <div class="chat-partner-info">
        <span id="partner-icon"></span>
        <span id="partner-name">Partner</span>
      </div>
      <div class="session-badge" id="session-badge">● Live</div>
    </div>

    <div class="chat-paused-overlay" id="paused-overlay">
      <div class="paused-box">
        <span>⏸</span>
        <p>Chat pausiert</p>
        <small>Warte auf die Lehrkraft</small>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div class="chat-input-bar" id="chat-input-bar">
      <input type="text" id="msg-input" placeholder="Nachricht eingeben…" maxlength="300" autocomplete="off" />
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
